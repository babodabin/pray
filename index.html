<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>골방 — 기도</title>
<meta name="theme-color" content="#f2ece0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="골방">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --paper:#f2ece0; --paper2:#ece4d4; --ink:#2c2620; --ink2:#5c5246;
    --dim:#8a7e6c; --line:#d8cdb8; --accent:#7a5c3a; --accent2:#9c7a4e;
    --gold:#a8863e; --done:#6b7d52; --card:#f8f3e9;
  }
  html,body{height:100%;}
  body{background:var(--paper);color:var(--ink);
    font-family:'Noto Serif KR',serif;line-height:1.6;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px;margin:0 auto;min-height:100%;}

  /* ── 헤더 ── */
  header{padding:22px 22px 14px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-family:'Gowun Batang',serif;font-size:26px;font-weight:700;letter-spacing:0.06em;}
  .brand .en{font-size:9px;letter-spacing:0.4em;color:var(--dim);text-transform:uppercase;}
  .streak{margin-top:10px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:7px;}
  .streak .flame{font-size:15px;}
  .streak b{font-weight:700;font-size:15px;}

  /* ── 달력 ── */
  #calWrap{padding:4px 16px 20px;}
  .calHead{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 12px;}
  .calHead .mo{font-family:'Gowun Batang',serif;font-size:17px;font-weight:700;letter-spacing:0.04em;}
  .navBtn{width:38px;height:38px;border:none;background:transparent;color:var(--ink2);
    font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .navBtn:active{background:var(--paper2);}
  .calToday{font-size:12px;color:var(--accent);border:1px solid var(--line);
    padding:5px 11px;border-radius:14px;background:var(--card);cursor:pointer;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .dow span{text-align:center;font-size:11px;color:var(--dim);padding:4px 0;letter-spacing:0.02em;}
  .dow span:first-child{color:#b06a5a;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:11px;cursor:pointer;position:relative;font-size:14px;color:var(--ink2);
    background:transparent;border:1px solid transparent;}
  .cell.empty{cursor:default;}
  .cell.sun{color:#b06a5a;}
  .cell:active:not(.empty){background:var(--paper2);}
  .cell.today{border-color:var(--accent2);font-weight:700;color:var(--accent);}
  .cell.has{background:var(--card);}
  .cell.has .dot{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:var(--done);}
  .cell.sel{background:var(--accent);color:#fff !important;font-weight:700;}
  .cell.sel .dot{background:#f2d9a0;}
  .cell.future{color:#c4b9a4;}

  /* ── 그날 기도 패널 ── */
  #day{padding:0 18px 40px;display:none;}
  #day.show{display:block;}
  .dayHead{display:flex;align-items:flex-end;justify-content:space-between;
    padding:18px 4px 14px;border-bottom:2px solid var(--ink);margin-bottom:4px;}
  .dayHead .dlong{font-family:'Gowun Batang',serif;font-size:21px;font-weight:700;}
  .dayHead .dsub{font-size:12px;color:var(--dim);margin-top:3px;}

  .sectLabel{font-size:11px;letter-spacing:0.28em;color:var(--dim);
    text-transform:uppercase;margin:26px 4px 12px;font-family:'Noto Serif KR';}

  /* 단계 버튼 */
  .step{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:9px;overflow:hidden;}
  .stepBtn{width:100%;display:flex;align-items:center;gap:13px;padding:15px 16px;
    background:transparent;border:none;cursor:pointer;text-align:left;color:var(--ink);font-family:inherit;}
  .stepNum{flex:0 0 30px;height:30px;border-radius:50%;background:var(--paper2);
    color:var(--accent);font-family:'Gowun Batang',serif;font-weight:700;font-size:15px;
    display:flex;align-items:center;justify-content:center;}
  .step.done .stepNum{background:var(--done);color:#fff;}
  .step.done .stepTag{color:var(--done);}
  .stepTitles{flex:1;min-width:0;}
  .stepTag{font-family:'Gowun Batang',serif;font-size:16px;font-weight:700;letter-spacing:0.02em;}
  .stepSub{font-size:11.5px;color:var(--dim);margin-top:1px;}
  .stepChev{color:var(--dim);font-size:13px;transition:transform 0.25s;}
  .step.open .stepChev{transform:rotate(90deg);}
  .stepBody{max-height:0;overflow:hidden;transition:max-height 0.3s ease;}
  .step.open .stepBody{max-height:1200px;}
  .stepInner{padding:2px 16px 16px;}
  .guide{background:var(--paper);border-radius:10px;padding:13px 14px;margin-bottom:12px;
    border-left:3px solid var(--accent2);}
  .guide .gline{font-size:13.5px;color:var(--ink2);margin:5px 0;}
  .guide .gk{color:var(--accent);font-weight:600;}
  .guide .gkey{font-size:11.5px;color:var(--dim);margin-top:8px;font-style:italic;}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#fffdf8;
    padding:12px 13px;font-family:inherit;font-size:15px;color:var(--ink);line-height:1.7;
    resize:vertical;min-height:90px;}
  textarea:focus{outline:none;border-color:var(--accent2);}
  textarea::placeholder{color:#bcae97;}

  /* 중보 분류 */
  .inter{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:9px;overflow:hidden;}
  .interHead{display:flex;align-items:center;gap:10px;padding:13px 14px;}
  .interHead .nm{flex:1;font-family:'Gowun Batang',serif;font-size:16px;font-weight:700;
    border:none;background:transparent;color:var(--ink);font-family:'Gowun Batang',serif;}
  .interHead .nm:focus{outline:none;border-bottom:1px dashed var(--accent2);}
  .miniBtn{border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:16px;
    width:30px;height:30px;border-radius:8px;}
  .miniBtn:active{background:var(--paper2);}
  .interBody{padding:0 14px 14px;}
  .interBody textarea{min-height:70px;font-size:14.5px;}

  .addCat{width:100%;padding:14px;border:1px dashed var(--line);border-radius:14px;
    background:transparent;color:var(--accent);font-family:inherit;font-size:14px;cursor:pointer;
    margin-top:4px;}
  .addCat:active{background:var(--card);}

  .saveNote{text-align:center;font-size:11.5px;color:var(--dim);margin-top:20px;padding:0 10px;}

  .backBtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);
    background:none;border:none;cursor:pointer;padding:14px 4px 4px;font-family:inherit;}

  /* 토스트 */
  #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 26px);
    transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);
    padding:11px 20px;border-radius:22px;font-size:13.5px;opacity:0;pointer-events:none;
    transition:all 0.3s;z-index:50;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>골방</h1><span class="en">prayer</span></div>
    <div class="streak" id="streak"></div>
  </header>

  <div id="calWrap">
    <div class="calHead">
      <button class="navBtn" id="prevMo">‹</button>
      <div class="mo" id="moLabel"></div>
      <button class="navBtn" id="nextMo">›</button>
    </div>
    <div class="dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="grid" id="calGrid"></div>
    <div style="text-align:center;margin-top:14px;">
      <button class="calToday" id="goToday">오늘로</button>
    </div>
  </div>

  <div id="day">
    <button class="backBtn" id="backTop">‹ 달력</button>
    <div class="dayHead">
      <div><div class="dlong" id="dLong"></div><div class="dsub" id="dSub"></div></div>
    </div>

    <div class="sectLabel">매일의 기도</div>
    <div id="steps"></div>

    <div class="sectLabel">중보 — 다른 이를 위하여</div>
    <div id="inters"></div>
    <button class="addCat" id="addCat">+ 분류 추가</button>

    <div class="saveNote">단계의 번호를 누르면 ✓ 기도 완료 체크가 됩니다. 글은 선택이에요.<br>쓰는 즉시 이 기기에 저장됩니다. 어제의 중보 내용은 오늘로 이어져요.</div>
  </div>
</div>

<div id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const STORE='goolbang_prayer_v1';

// ── 5단계 가이드 (고정) ──
const STEPS=[
  {tag:'열기', name:'감사와 찬양', sub:'이냐시오 1단 · 예수전도단 1단',
   method:'오늘 느낀 작은 고마움 하나를 떠올리고, 그 고마움을 주신 하나님의 크심을 인정합니다.',
   merit:'내 상황이 욥처럼 고통스럽더라도, 아주 작은 긍정의 실마리를 찾아내어 마음의 에너지를 ‘감사’로 전환시킵니다.',
   key:'하나님 찬양 · 감사함'},
  {tag:'비우기', name:'정화와 대적', sub:'이냐시오 4단 · 예수전도단 2,4단',
   method:'내 마음을 무겁게 하는 죄책감이나 불안, 질병에 대한 공포를 솔직히 내놓고, “예수 이름으로 내 마음에서 떠나가라”고 단호하게 선포합니다.',
   merit:'단순히 자책하는 데 머물지 않고, 나를 짓누르는 어둠을 밀어내는 영적 주도권을 회복하게 해줍니다.',
   key:'사탄과 싸움 · 죄책감'},
  {tag:'훑기', name:'내면 성찰', sub:'이냐시오 3단',
   method:'빗자루질을 하듯 오늘 하루의 감정들을 천천히 훑어봅니다. 언제 마음이 힘들었는지, 언제 평화로웠는지 그 흐름을 살펴봅니다.',
   merit:'내가 왜 힘들었는지 객관적으로 보게 되어, 감정에 휩쓸리지 않고 ‘나’를 차분하게 정리할 수 있습니다.',
   key:'하나님께 말씀하기'},
  {tag:'듣기', name:'수신과 기다림', sub:'예수전도단 5단',
   method:'내 생각을 멈추고 잠시 침묵하며, 예수님이 지금 나에게 주고 싶은 마음이나 단어가 있는지 가만히 기다려 봅니다.',
   merit:'내가 일방적으로 떠드는 기도가 아니라, 예수님과 ‘진짜 1대1 대화’를 나누는 신비로운 체험을 하게 합니다.',
   key:'하나님의 말씀 듣기'},
  {tag:'닫기', name:'결심과 확신', sub:'이냐시오 5단 · 예수전도단 7단',
   method:'내일(혹은 다음 순간)을 어떻게 살지 짧게 약속하고, 이미 내 기도를 들으셨음을 믿으며 기분 좋게 마무리합니다.',
   merit:'기도를 마친 후 무기력하게 있는 것이 아니라, “그래, 다시 해보자”라는 구체적인 희망과 에너지를 가지고 일어설 수 있게 합니다.',
   key:'오늘 기도 · 감사 · 내일'},
];
const DEFAULT_CATS=['가족','친구','친척'];

// ── 데이터 ──
let DB=load();
function load(){ try{return JSON.parse(localStorage.getItem(STORE))||{days:{}};}catch(e){return {days:{}};} }
// 구버전 데이터에 done 배열 추가(글이 있던 단계는 체크된 것으로 간주)
Object.keys(DB.days).forEach(k=>{ const d=DB.days[k];
  if(!d.done) d.done=(d.steps||['','','','','']).map(s=>!!(s&&s.trim()));
});
function save(){ try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){} }

function keyOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseKey(k){ const [y,m,da]=k.split('-').map(Number); return new Date(y,m-1,da); }

// 그날 데이터 가져오기 — 없으면 어제 중보 이어받아 생성(저장은 입력 시)
function getDay(key){
  if(DB.days[key]) return DB.days[key];
  // 직전(가장 가까운 과거) 기록의 중보 분류/내용을 이어받음
  const prevKey=Object.keys(DB.days).filter(k=>k<key).sort().pop();
  let cats;
  if(prevKey){ cats=DB.days[prevKey].cats.map(c=>({nm:c.nm, body:c.body})); }
  else { cats=DEFAULT_CATS.map(n=>({nm:n, body:''})); }
  return { steps:['','','','',''], done:[false,false,false,false,false], cats };
}
function commitDay(key,data){ DB.days[key]=data; save(); }
// 기도 여부 = 체크(✓) 기준
function dayHasContent(data){
  return !!(data && data.done && data.done.some(Boolean));
}

// ── 연속 일수 ──
function calcStreak(){
  let n=0; let d=new Date(); d.setHours(0,0,0,0);
  // 오늘 기록 없으면 어제부터 카운트(오늘은 아직 안 한 것일 수 있음)
  if(!(DB.days[keyOf(d)] && dayHasContent(DB.days[keyOf(d)]))){ d.setDate(d.getDate()-1); }
  while(true){ const k=keyOf(d);
    if(DB.days[k] && dayHasContent(DB.days[k])){ n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}
function renderStreak(){
  const n=calcStreak(); const el=$('#streak');
  if(n>0){ el.innerHTML='<span class="flame">🔥</span> <b>'+n+'</b>일 연속 기도 중'; }
  else { el.innerHTML='<span class="flame">🕯</span> 오늘, 골방으로 들어가요'; }
}

// ── 달력 ──
let viewY, viewM; // 현재 보는 연/월
const today=new Date(); today.setHours(0,0,0,0);
let selKey=null;

function renderCal(){
  $('#moLabel').textContent=viewY+'년 '+(viewM+1)+'월';
  const grid=$('#calGrid'); grid.innerHTML='';
  const first=new Date(viewY,viewM,1).getDay();
  const days=new Date(viewY,viewM+1,0).getDate();
  for(let i=0;i<first;i++){ const c=document.createElement('div'); c.className='cell empty'; grid.appendChild(c); }
  for(let d=1;d<=days;d++){
    const cell=document.createElement('div'); cell.className='cell';
    const date=new Date(viewY,viewM,d); const k=keyOf(date);
    const dow=date.getDay();
    if(dow===0) cell.classList.add('sun');
    if(k===keyOf(today)) cell.classList.add('today');
    if(date>today) cell.classList.add('future');
    if(DB.days[k] && dayHasContent(DB.days[k])){ cell.classList.add('has'); }
    if(k===selKey) cell.classList.add('sel');
    cell.innerHTML='<span>'+d+'</span>'+((DB.days[k]&&dayHasContent(DB.days[k]))?'<span class="dot"></span>':'');
    cell.addEventListener('click',()=>openDay(k));
    grid.appendChild(cell);
  }
}

// ── 그날 패널 ──
let curKey=null, curData=null;
function openDay(key){
  curKey=key; selKey=key; curData=getDay(key);
  const d=parseKey(key);
  const days=['일','월','화','수','목','금','토'];
  $('#dLong').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  $('#dSub').textContent=d.getFullYear()+'년 · '+days[d.getDay()]+'요일'
    + (key===keyOf(today)?' · 오늘':'');
  renderSteps(); renderInters();
  $('#day').classList.add('show');
  renderCal();
  $('#day').scrollIntoView({behavior:'smooth',block:'start'});
}

function persist(){ commitDay(curKey,curData); renderStreak(); renderCal(); }

function renderSteps(){
  const box=$('#steps'); box.innerHTML='';
  STEPS.forEach((s,i)=>{
    const done=!!curData.done[i];
    const el=document.createElement('div'); el.className='step'+(done?' done':'');
    el.innerHTML=
      '<button class="stepBtn"><div class="stepNum">'+(done?'✓':(i+1))+'</div>'+
      '<div class="stepTitles"><div class="stepTag">['+s.tag+'] '+s.name+'</div>'+
      '<div class="stepSub">'+s.sub+'</div></div><div class="stepChev">›</div></button>'+
      '<div class="stepBody"><div class="stepInner">'+
      '<div class="guide"><div class="gline"><span class="gk">방법.</span> '+s.method+'</div>'+
      '<div class="gline"><span class="gk">장점.</span> '+s.merit+'</div>'+
      '<div class="gkey">'+s.key+'</div></div>'+
      '<textarea placeholder="남기고 싶은 기도·메모가 있다면 적어보세요… (선택)">'+esc(curData.steps[i]||'')+'</textarea>'+
      '</div></div>';
    const btn=el.querySelector('.stepBtn');
    btn.addEventListener('click',()=>{ el.classList.toggle('open'); });
    const num=el.querySelector('.stepNum');
    num.addEventListener('click',e=>{ e.stopPropagation();
      curData.done[i]=!curData.done[i];
      el.classList.toggle('done', curData.done[i]);
      num.textContent=curData.done[i]?'✓':(i+1);
      persist(); });
    const ta=el.querySelector('textarea');
    ta.addEventListener('input',e=>{ curData.steps[i]=e.target.value; persist(); });
    box.appendChild(el);
  });
}

function renderInters(){
  const box=$('#inters'); box.innerHTML='';
  curData.cats.forEach((c,i)=>{
    const el=document.createElement('div'); el.className='inter';
    el.innerHTML=
      '<div class="interHead"><input class="nm" value="'+esc(c.nm)+'" placeholder="분류 이름">'+
      '<button class="miniBtn up">↑</button><button class="miniBtn del">×</button></div>'+
      '<div class="interBody"><textarea placeholder="기도할 사람·제목을 적어보세요…">'+esc(c.body||'')+'</textarea></div>';
    const nm=el.querySelector('.nm');
    nm.addEventListener('input',e=>{ curData.cats[i].nm=e.target.value; persist(); });
    const ta=el.querySelector('textarea');
    ta.addEventListener('input',e=>{ curData.cats[i].body=e.target.value; persist(); });
    el.querySelector('.del').addEventListener('click',()=>{
      if(confirm('"'+(c.nm||'이 분류')+'" 분류를 지울까요? 내일부터도 이어지지 않아요.')){
        curData.cats.splice(i,1); persist(); renderInters(); }
    });
    el.querySelector('.up').addEventListener('click',()=>{
      if(i>0){ const t=curData.cats[i]; curData.cats[i]=curData.cats[i-1]; curData.cats[i-1]=t;
        persist(); renderInters(); }
    });
    box.appendChild(el);
  });
}

$('#addCat').addEventListener('click',()=>{
  curData.cats.push({nm:'',body:''}); persist(); renderInters();
  const last=$('#inters').lastChild; if(last){ last.querySelector('.nm').focus(); last.scrollIntoView({behavior:'smooth',block:'center'}); }
});

$('#backTop').addEventListener('click',()=>{
  $('#day').classList.remove('show'); selKey=null; renderCal();
  window.scrollTo({top:0,behavior:'smooth'});
});

// ── 네비 ──
$('#prevMo').addEventListener('click',()=>{ viewM--; if(viewM<0){viewM=11;viewY--;} renderCal(); });
$('#nextMo').addEventListener('click',()=>{ viewM++; if(viewM>11){viewM=0;viewY++;} renderCal(); });
$('#goToday').addEventListener('click',()=>{ viewY=today.getFullYear(); viewM=today.getMonth(); renderCal(); openDay(keyOf(today)); });

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }

// ── 시작 ──
viewY=today.getFullYear(); viewM=today.getMonth();
renderStreak(); renderCal();
openDay(keyOf(today)); // 오늘 자동으로 펼침
</script>
